<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Lone Star ITS logo</title>
  <desc id="desc">A navy and teal Texas star with circuit lines and Lone Star ITS text.</desc>
  <defs>
    <linearGradient id="navyTeal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07184a"/>
      <stop offset="1" stop-color="#2f7f99"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#07184a" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="520" rx="36" fill="#f7f9fc"/>
  <path d="M0 85 C110 10 210 12 322 78" fill="none" stroke="#5aafc4" stroke-width="8" opacity="0.55"/>
  <path d="M850 430 C965 360 1070 370 1200 292" fill="none" stroke="#2f7f99" stroke-width="12" opacity="0.7"/>
  <g transform="translate(250 260)" filter="url(#shadow)">
    <path d="M0,-150 L35,-45 L145,-45 L56,18 L90,125 L0,60 L-90,125 L-56,18 L-145,-45 L-35,-45 Z" fill="url(#navyTeal)"/>
    <circle cx="0" cy="0" r="56" fill="none" stroke="#ffffff" stroke-width="16" opacity="0.92"/>
    <path d="M-190 -10 h72 m236 0 h72 M-160 58 h72 m176 0 h72 M-160 -78 h62 m196 0 h62" stroke="#2f7f99" stroke-width="10" stroke-linecap="round" fill="none"/>
    <circle cx="-196" cy="-10" r="13" fill="#f7f9fc" stroke="#07184a" stroke-width="8"/>
    <circle cx="196" cy="-10" r="13" fill="#f7f9fc" stroke="#07184a" stroke-width="8"/>
    <circle cx="-166" cy="58" r="10" fill="#f7f9fc" stroke="#8b97a5" stroke-width="7"/>
    <circle cx="166" cy="58" r="10" fill="#f7f9fc" stroke="#8b97a5" stroke-width="7"/>
  </g>
  <g transform="translate(470 196)">
    <text x="0" y="0" font-family="Rajdhani, Inter, Arial, sans-serif" font-size="96" font-weight="800" letter-spacing="-2" fill="#07184a">Lone Star</text>
    <text x="0" y="88" font-family="Rajdhani, Inter, Arial, sans-serif" font-size="76" font-weight="800" letter-spacing="20" fill="#2f7f99">ITS</text>
    <line x1="0" y1="120" x2="520" y2="120" stroke="#8b97a5" stroke-width="3" opacity="0.6"/>
    <text x="0" y="172" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700" letter-spacing="8" fill="#07184a">MANAGED TECHNOLOGY SERVICES</text>
  </g>
</svg>
